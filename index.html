<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CruzeiroNet - Automação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1 class="logo">CruzeiroNet</h1>
        <p class="subtitle">Automação Acadêmica</p>
        <p class="tag">CRUZEIRO DO SUL</p>

        <button class="btn-contas" onclick="abrirModalContas()">
            <i class="fas fa-users"></i> Contas Salvas
        </button>

        <div class="input-group">
            <label>Email Educacional:</label>
            <div class="input-box">
                <input type="email" id="email" placeholder="nome@cruzeirodosul.edu.br">
            </div>
        </div>

        <div class="input-group">
            <label>Senha:</label>
            <div class="input-box">
                <input type="password" id="senha" placeholder="Sua senha do portal">
                <i class="fas fa-eye-slash eye-icon" id="eyeIcon" onclick="toggleSenha()"></i>
            </div>
        </div>

        <button class="btn-pendente" onclick="simularBusca()" style="margin-top: 20px;">
            <i class="fas fa-search"></i> Buscar Atividades
        </button>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Conectando...</p>
    </div>

    <div id="notification-container"></div>

    <div class="modal-overlay" id="modalTarefas">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Atividades Pendentes</h3>
                <span class="close-btn" onclick="fecharModal()">&times;</span>
            </div>
            <div id="listaContainer"></div>
            <button class="btn-salvar" onclick="simularExecucao()" style="margin-top: 20px;">
                <i class="fas fa-robot"></i> Resolver Pendentes
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modalContas">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Contas Salvas</h3>
                <span class="close-btn" onclick="fecharModalContas()">&times;</span>
            </div>
            <div id="listaContasContainer"></div>
        </div>
    </div>

    <script>
        // --- FUNÇÕES DA TELA DE CARREGAMENTO ---
        function abrirLoading(texto) {
            document.getElementById('loadingText').innerText = texto;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function atualizarLoading(texto) {
            document.getElementById('loadingText').innerText = texto;
        }

        function fecharLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // --- NOTIFICAÇÕES LATERAIS ---
        function showNotification(title, message) {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `
                <i class="fas fa-bolt"></i>
                <div class="notification-content">
                    <strong>${title}</strong>
                    <span>${message}</span>
                </div>
            `;
            container.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 300);
            }, 4500);
        }

        // --- ANIMAÇÃO DO OLHO ---
        function toggleSenha() {
            const input = document.getElementById('senha');
            const icon = document.getElementById('eyeIcon');
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye', 'active'); 
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye', 'active');
                icon.classList.add('fa-eye-slash');
            }
        }

        // --- SISTEMA DE CONTAS SALVAS ---
        function getContas() {
            const contas = localStorage.getItem('cruzeiro_accounts');
            return contas ? JSON.parse(contas) : [];
        }

        function salvarContaLocal(email, senha) {
            let contas = getContas();
            if (!contas.some(c => c.email === email)) {
                contas.push({ email: email, pass: senha });
                localStorage.setItem('cruzeiro_accounts', JSON.stringify(contas));
            }
        }

        function abrirModalContas() {
            document.getElementById('modalContas').style.display = 'flex';
            renderizarContas();
        }

        function fecharModalContas() {
            document.getElementById('modalContas').style.display = 'none';
        }

        function renderizarContas() {
            const container = document.getElementById('listaContasContainer');
            const contas = getContas();

            if (contas.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; padding: 20px;">Nenhuma conta salva no momento.</p>';
                return;
            }

            container.innerHTML = '';
            contas.forEach(conta => {
                const div = document.createElement('div');
                div.className = 'conta-item';
                div.innerHTML = `
                    <span class="conta-email">${conta.email}</span>
                    <div class="conta-actions">
                        <button class="btn-usar" onclick="preencherConta('${conta.email}', '${conta.pass}')">Usar</button>
                        <button class="btn-excluir" onclick="excluirConta('${conta.email}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function preencherConta(email, pass) {
            document.getElementById('email').value = email;
            document.getElementById('senha').value = pass;
            fecharModalContas();
            showNotification("Pronto", "Credenciais carregadas.");
        }

        function excluirConta(email) {
            if(confirm(`Excluir a conta ${email}?`)) {
                let contas = getContas();
                contas = contas.filter(c => c.email !== email); 
                localStorage.setItem('cruzeiro_accounts', JSON.stringify(contas));
                renderizarContas(); 
            }
        }

        // --- SELECIONAR TODAS ---
        function toggleSelecionarTodas(source) {
            const checkboxes = document.getElementsByName('tarefaCheck');
            for(let i = 0; i < checkboxes.length; i++) {
                checkboxes[i].checked = source.checked;
            }
        }

        // --- SIMULAÇÃO DA BUSCA (COM NOVO BOTÃO DE SELECIONAR) ---
        function simularBusca() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if(!email || !senha) {
                return showNotification("Aviso", "Preencha seu Email e Senha.");
            }

            salvarContaLocal(email, senha);

            abrirLoading("Autenticando...");
            showNotification("Conexão Estabelecida", "Acessando servidores da Cruzeiro do Sul...");
            
            setTimeout(() => {
                atualizarLoading("Buscando matérias...");
                showNotification("Acesso Liberado", "Lendo grade curricular...");
                
                setTimeout(() => {
                    fecharLoading();
                    const container = document.getElementById('listaContainer');
                    // Inseri a opção de Selecionar Todas aqui
                    container.innerHTML = `
                        <div style="margin-bottom: 15px; border-bottom: 1px solid #1a273b; padding-bottom: 15px; display: flex; align-items: center;">
                            <input type="checkbox" id="checkAll" onchange="toggleSelecionarTodas(this)" style="accent-color: #0088ff; width: 18px; height: 18px; cursor: pointer;">
                            <label for="checkAll" style="color: #0088ff; font-weight: 600; font-size: 0.95rem; margin-left: 10px; cursor: pointer;">Selecionar Todas</label>
                        </div>
                        <div class="task-item">
                            <input type="checkbox" name="tarefaCheck" id="t_1">
                            <label for="t_1" style="margin-left:10px; color:#fff">Questionário: Lógica de Programação <span style="color:#666; font-size:0.8em">(Pendente)</span></label>
                        </div>
                        <div class="task-item">
                            <input type="checkbox" name="tarefaCheck" id="t_2">
                            <label for="t_2" style="margin-left:10px; color:#fff">Fórum: Estrutura de Dados <span style="color:#666; font-size:0.8em">(Pendente)</span></label>
                        </div>
                    `;
                    document.getElementById('modalTarefas').style.display = 'flex';
                }, 1800);

            }, 1800);
        }

        function fecharModal() { 
            document.getElementById('modalTarefas').style.display = 'none'; 
        }

        // --- SIMULAÇÃO DO ENVIO (IA) ---
        function simularExecucao() {
            // Verifica se tem alguma selecionada antes de rodar
            const checkboxes = document.getElementsByName('tarefaCheck');
            let temSelecionada = false;
            for(let i = 0; i < checkboxes.length; i++) {
                if(checkboxes[i].checked) temSelecionada = true;
            }

            if(!temSelecionada) {
                return showNotification("Atenção", "Selecione pelo menos uma atividade na lista!");
            }

            abrirLoading("Realizando pendentes...");
            showNotification("Análise Iniciada", "Lendo arquivos da matéria...");
            
            setTimeout(() => {
                fecharLoading();
                // Texto limpo sem variáveis, fim do bug do 'undefined'
                showNotification("Questões respondidas com sucesso.");
                fecharModal();
            }, 3500);
        }
    </script>
</body>
</html>
